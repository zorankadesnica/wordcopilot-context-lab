project_name: wordcopilot-context-lab

models:
  retriever_name: sentence-transformers/all-MiniLM-L6-v2
  generator_name: google/flan-t5-base

chunking:
  chunk_size_words: 140
  stride_words: 40
  max_global_sentences: 8

retrieval:
  initial_top_k: 6
  final_top_k: 3
  mmr_lambda: 0.75
  token_budget_words: 500

prompting:
  max_new_tokens: 128
  temperature: 0.0

runtime:
  batch_size: 8
  seed: 42

metrics:
  top_terms_k: 25
